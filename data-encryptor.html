<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据加密转换工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root {
            --primary-color: #4472c4;
            --secondary-color: #203764;
            --background-color: #f4f7f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei';
            background-color: var(--background-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { color: var(--secondary-color); margin-bottom: 30px; }
        .description { font-size: 14px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: var(--secondary-color); }
        input[type="file"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background-color: var(--secondary-color); }
        .btn-publish {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: #2e7d32;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-publish:hover { background-color: #1b5e20; }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f0f9ff;
            border: 1px dashed var(--primary-color);
            border-radius: 8px;
            display: none;
        }
        .error { color: #d93025; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 数据加密转换工具</h1>
    <p class="description">
        本工具将您的 Excel 原始数据加密。加密后的文件（.bin）可以放心地上传到 GitHub 仓库，
        只有在看板输入了正确的解密密码后，才能还原数据并显示看版。
    </p>

    <div class="input-group">
        <label for="file-input">1. 选择原始 Excel 文件 (.xlsx)</label>
        <input type="file" id="file-input" accept=".xlsx,.xls">
    </div>

    <div class="input-group">
        <label for="password-input">2. 设置加密密码（务必与看板登录密码一致）</label>
        <input type="password" id="password-input" placeholder="输入加密密码...">
    </div>

    <div class="input-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-top: 30px;">
        <h3 style="margin-top:0; font-size: 16px; color: #444;">🚀 高级：一键发布到 GitHub (手机端推荐)</h3>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">填写 GitHub Token，即可在手机上直接加密并更新看版数据，无需手动上传。</p>
        
        <label for="github-repo-input">GitHub 仓库名称 (格式: 账号/仓库名)</label>
        <input type="text" id="github-repo-input" value="hulala8/test2" style="margin-bottom: 10px;">
        
        <label for="github-token-input">GitHub 访问令牌 (Personal Access Token)</label>
        <input type="password" id="github-token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxx">
        
        <div style="margin-top: 10px; font-size: 13px;">
            <input type="checkbox" id="save-settings" checked>
            <label for="save-settings" style="display:inline; color:#555;">将 Token 和配置保存在本浏览器中</label>
        </div>
        
        <button class="btn-publish" onclick="publishToGitHub()" id="publish-btn">⚡️ 手机端：加密并直接发布到看板</button>
    </div>

    <button class="btn" onclick="encryptFile()" style="margin-top: 20px;">电脑端：仅保存本地 data.bin 提交流程</button>

    <div id="result" class="result-box">
        <p style="color: #2e7d32; font-weight: bold; margin-bottom: 10px;">✅ 加密完成！</p>
        <p style="font-size: 13px; color: #444;">
            请将下载的 <b>data.bin</b> 文件上传到您的 GitHub 仓库目录下，代替原来的 Excel 文件。
        </p>
    </div>

    <div id="error-msg" class="error"></div>
</div>

<script>
    // 页面加载时恢复配置
    window.onload = function() {
        if (localStorage.getItem('githubRepo')) document.getElementById('github-repo-input').value = localStorage.getItem('githubRepo');
        if (localStorage.getItem('githubToken')) document.getElementById('github-token-input').value = localStorage.getItem('githubToken');
        if (localStorage.getItem('encryptPassword')) document.getElementById('password-input').value = localStorage.getItem('encryptPassword');
    };

    function saveSettings() {
        if (document.getElementById('save-settings').checked) {
            localStorage.setItem('githubRepo', document.getElementById('github-repo-input').value);
            localStorage.setItem('githubToken', document.getElementById('github-token-input').value);
            localStorage.setItem('encryptPassword', document.getElementById('password-input').value);
        } else {
            localStorage.removeItem('githubRepo');
            localStorage.removeItem('githubToken');
            localStorage.removeItem('encryptPassword');
        }
    }

    async function getEncryptedPayload() {
        return new Promise((resolve, reject) => {
            const fileInput = document.getElementById('file-input');
            const passwordInput = document.getElementById('password-input');
            
            if (!fileInput.files || fileInput.files.length === 0) return reject('请先选择文件！');
            const password = passwordInput.value;
            if (!password) return reject('请输入加密密码！');

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    // 1. 读取原生 Excel 数据
                    const data = new Uint8Array(e.target.result);
                    
                    // 2. 使用 SheetJS 解析 Excel
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 3. 提取精简版二维 JSON 数组
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { 
                        header: 1,
                        raw: false,
                        defval: ''
                    });
                    
                    // 过滤明显的空行以节省体积
                    const validData = jsonData.filter(row => row && row.length > 0 && row.some(cell => String(cell).trim() !== ''));
                    const jsonString = JSON.stringify(validData);
                    
                    // 4. Pako.js 极限压缩 (Gzip Deflate 算法)
                    const compressedUint8Array = pako.deflate(jsonString);
                    
                    // 5. 转换为 CryptoJS WordArray 并加密
                    const wordArray = CryptoJS.lib.WordArray.create(compressedUint8Array);
                    const encrypted = CryptoJS.AES.encrypt(wordArray, password).toString();
                    
                    // 6. 生成最终的组合数据包
                    const filePayload = file.name + '|' + encrypted;
                    resolve(filePayload);
                } catch (err) {
                    console.error("加密异常:", err);
                    reject('加密过程中出现错误。请确保上传了规范的 Excel 文件。');
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    async function encryptFile() {
        const errorMsg = document.getElementById('error-msg');
        const resultBox = document.getElementById('result');
        errorMsg.textContent = '';
        resultBox.style.display = 'none';

        saveSettings();

        try {
            const filePayload = await getEncryptedPayload();
            
            // 将包含文件名和加密数据的字符串下载
            const blob = new Blob([filePayload], { type: 'application/octet-stream' });
            const downloadUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'data.bin';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            resultBox.innerHTML = `
                <p style="color: #2e7d32; font-weight: bold; margin-bottom: 10px;">✅ 加密完成并已下载！</p>
                <p style="font-size: 13px; color: #444;">请将下载的 <b>data.bin</b> 文件上传到您的 GitHub 仓库。</p>
            `;
            resultBox.style.display = 'block';
        } catch (err) {
            errorMsg.textContent = err;
        }
    }

    async function publishToGitHub() {
        const errorMsg = document.getElementById('error-msg');
        const resultBox = document.getElementById('result');
        const repo = document.getElementById('github-repo-input').value.trim();
        const token = document.getElementById('github-token-input').value.trim();
        const publishBtn = document.getElementById('publish-btn');
        
        errorMsg.textContent = '';
        resultBox.style.display = 'none';

        if (!repo || !token) {
            errorMsg.textContent = '直接发布需要填写 GitHub 仓库名和 Token！';
            return;
        }

        saveSettings();
        publishBtn.textContent = '正在极速处理中...';
        publishBtn.disabled = true;

        try {
            // 1. 获取加密 payload
            const filePayload = await getEncryptedPayload();
            publishBtn.textContent = '正在获取远程仓库信息...';

            // 2. Fetch existing file SHA (required for updating file in GitHub API)
            const apiUrl = `https://api.github.com/repos/${repo}/contents/data.bin`;
            let sha = '';
            
            try {
                const getResponse = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                } else if (getResponse.status !== 404) {
                    throw new Error(`检查仓库失败 (${getResponse.status})`);
                }
            } catch (err) {
                throw new Error('无法连接到 GitHub 仓库，请检查账号/仓库名或 Token 是否正确。');
            }

            publishBtn.textContent = '正在编码数据 (此过程可能需要几秒钟)...';

            // 3. 将包含中文前缀和 Base64 内容的长字符串安全转换为 Base64
            // 使用原生 Blob 和 FileReader 实现无损且不崩溃的巨大文件 Base64 编码
            const blob = new Blob([filePayload], { type: 'text/plain;charset=utf-8' });
            const reader = new FileReader();
            
            reader.onloadend = async function() {
                try {
                    const base64Content = reader.result.split(',')[1];
                    
                    publishBtn.textContent = '正在上传到 GitHub...';
                    
                    // 4. PUT updated file to GitHub
                    const putResponse = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update data.bin from Mobile Encryptor API: ${new Date().toLocaleString()}`,
                            content: base64Content,
                            sha: sha || undefined
                        })
                    });

                    if (!putResponse.ok) {
                        const errorData = await putResponse.json();
                        throw new Error('发布失败: ' + (errorData.message || putResponse.statusText));
                    }

                    resultBox.innerHTML = `
                        <p style="color: #2e7d32; font-weight: bold; margin-bottom: 10px;">🎉 发布成功！</p>
                        <p style="font-size: 13px; color: #444;">新数据已直接推送至 ${repo}。<br>请稍等 10-30 秒后刷新看板，即可看到最新数据！</p>
                        <a href="https://${repo.split('/')[0]}.github.io/${repo.split('/')[1]}/" target="_blank" style="display:inline-block; margin-top:10px; color:var(--primary-color); font-weight:bold; text-decoration:none;">🔗 立即体验最新看版 >>></a>
                    `;
                    resultBox.style.display = 'block';

                } catch (err) {
                    errorMsg.textContent = err.message || err;
                } finally {
                    publishBtn.textContent = '⚡️ 手机端：加密并直接发布到看板';
                    publishBtn.disabled = false;
                }
            };
            reader.onerror = function() {
                errorMsg.textContent = '文件编码转换为 Base64 失败，内存不足。';
                publishBtn.textContent = '⚡️ 手机端：加密并直接发布到看板';
                publishBtn.disabled = false;
            };
            
            // 开始异步读取
            reader.readAsDataURL(blob);

        } catch (err) {
            errorMsg.textContent = err.message || err;
            publishBtn.textContent = '⚡️ 手机端：加密并直接发布到看板';
            publishBtn.disabled = false;
        }
    }
</script>

</body>
</html>
